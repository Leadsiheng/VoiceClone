# VoiceClone Configuration
# Copy this file to config.local.yaml and modify for your setup

llm:
  # Backend: "deepseek" (API) or "ollama" (local)
  backend: deepseek

  deepseek:
    api_key: "sk-dfb882eeff8243908fb3a11ef6070113"
    api_base: "https://api.deepseek.com/v1"
    model: "deepseek-chat"
    max_tokens: 512
    temperature: 0.7

  ollama:
    host: "http://localhost:11434"
    model: "gemma4:latest"
    num_predict: 256
    temperature: 0.7

tts:
  engine: indextts2
  # Path to index-tts project (clone from https://github.com/index-tts/index-tts.git)
  index_tts_dir: "../index-tts"
  # Model checkpoint paths (relative to index_tts_dir)
  cfg_path: "checkpoints/config.yaml"
  model_dir: "checkpoints"
  # Performance options
  use_fp16: false          # FP16 inference (lower VRAM, slight quality loss)
  use_cuda_kernel: false    # CUDA compiled kernels (NVIDIA only)
  use_deepspeed: false      # DeepSpeed acceleration (experimental)
  # Sample rate for audio output (IndexTTS2 default is 24000)
  sample_rate: 24000
  # Directory containing speaker voice samples
  voices_dir: "./voices"

asr:
  engine: funasr
  # FunASR model for Chinese recognition
  model: "iic/speech_paraformer-large_asr_nat-zh-cn-16k-common-vocab8404-pytorch"
  # Enable Voice Activity Detection
  vad_model: "iic/speech_fsmn_vad_zh-cn-16k-common-pytorch"

server:
  host: "0.0.0.0"
  port: 7860
  # Enable Gradio public sharing link (creates temp URL for friends)
  share: true
