<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceClone UI Prototype</title>
<style>
  :root {
    --bg: #fafaf7;
    --text: #1a1a1a;
    --muted: #aaa;
    --border: #e0e0da;
    --card: #fff;
    --accent: #1a1a1a;
    --hover: #f4f4f2;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
  }

  .app {
    width: 100%;
    max-width: 680px;
    padding: 60px 40px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* ── Waveform (2x larger) ── */
  .waveform-wrap {
    width: 100%;
    height: 260px;
    position: relative;
    margin-bottom: 6px;
  }
  .waveform-wrap canvas {
    width: 100%;
    height: 260px;
    display: block;
  }

  /* ── Voice Selector (small, light, close to wave) ── */
  .voice-select-row {
    display: flex;
    justify-content: center;
    margin-bottom: 242px;
  }
  .voice-select {
    padding: 4px 10px 4px 10px;
    border: 1px solid #e8e8e2;
    border-radius: 6px;
    background: #f6f6f3;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    outline: none;
    appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg width='8' height='5' viewBox='0 0 8 5' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L4 4L7 1' stroke='%23aaa' stroke-width='1.2' stroke-linecap='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 8px center;
    padding-right: 24px;
    min-width: 100px;
    text-align: center;
    letter-spacing: 0.5px;
  }
  .voice-select:hover { border-color: #ccc; color: var(--text); }

  /* ── Mode + Style row ── */
  .control-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 36px;
    width: 100%;
    justify-content: center;
  }

  .mode-tabs {
    display: flex;
    gap: 5px;
    background: #ecece6;
    border-radius: 9px;
    padding: 3px;
    flex-shrink: 0;
  }
  .mode-tab {
    padding: 8px 22px;
    border-radius: 7px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    border: none;
    background: transparent;
    transition: all 0.2s ease;
    white-space: nowrap;
    font-family: inherit;
  }
  .mode-tab.active {
    background: var(--card);
    color: var(--text);
    font-weight: 500;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }

  .style-select {
    padding: 6px 28px 6px 12px;
    border: 1px solid #e4e4dd;
    border-radius: 8px;
    background: #f6f6f3;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    outline: none;
    appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg width='8' height='5' viewBox='0 0 8 5' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L4 4L7 1' stroke='%23aaa' stroke-width='1.2' stroke-linecap='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 10px center;
    min-width: 140px;
    text-align: center;
    font-family: inherit;
  }
  .style-select:hover { border-color: #ccc; }
  .style-select.hidden { visibility: hidden; }

  /* ── Interaction Area ── */
  .interact-area {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    min-height: 80px;
  }

  /* ── Mic Button ── */
  .mic-btn {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--card);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s ease;
    position: relative;
  }
  .mic-btn:hover {
    border-color: #b0b0b0;
    background: var(--hover);
  }
  .mic-btn.recording {
    border-color: #e04545;
    background: #fef5f5;
    animation: mic-pulse 1.2s ease-in-out infinite;
  }
  @keyframes mic-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(224,69,69,0.2); }
    50% { box-shadow: 0 0 0 16px rgba(224,69,69,0.02); }
  }
  .mic-icon {
    width: 34px;
    height: 34px;
    fill: none;
    stroke: var(--text);
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .recording .mic-icon { stroke: #e04545; }

  /* ── Text input + send ── */
  .text-row {
    display: flex;
    gap: 12px;
    width: 100%;
    align-items: center;
  }
  .text-input-wrap { flex: 1; }
  .text-input {
    width: 100%;
    padding: 14px 20px;
    border: 1px solid var(--border);
    border-radius: 24px;
    background: var(--card);
    color: var(--text);
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  .text-input:focus { border-color: #b0b0b0; }
  .text-input::placeholder { color: #c8c8c2; }

  .send-btn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .send-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
  }
  .send-btn:hover .send-icon { stroke: #fff; }
  .send-icon {
    width: 20px;
    height: 20px;
    fill: none;
    stroke: var(--text);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* ── Response toast ── */
  .response-toast {
    font-size: 14px;
    color: var(--muted);
    text-align: center;
    padding: 4px 0;
    min-height: 24px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .response-toast.visible { opacity: 1; }

  /* ── Mode panels ── */
  .mode-panel { display: none; width: 100%; }
  .mode-panel.active { display: flex; flex-direction: column; align-items: center; gap: 16px; }
</style>
</head>
<body>

<div class="app">
  <!-- Waveform (2x) -->
  <div class="waveform-wrap">
    <canvas id="waveform"></canvas>
  </div>

  <!-- Voice selector -->
  <div class="voice-select-row">
    <select class="voice-select" id="voice-select">
      <option>彪</option>
      <option>喆</option>
      <option>鑫</option>
    </select>
  </div>

  <!-- Mode tabs + Style dropdown -->
  <div class="control-row">
    <div class="mode-tabs" id="mode-tabs">
      <button class="mode-tab active" data-mode="voice">语音聊天</button>
      <button class="mode-tab" data-mode="sms">发送短信</button>
      <button class="mode-tab" data-mode="read">朗读内容</button>
    </div>
    <select class="style-select" id="style-select">
    </select>
  </div>

  <!-- Interactive area -->
  <div class="interact-area">

    <div class="mode-panel active" id="panel-voice">
      <button class="mic-btn" id="mic-btn" onclick="handleMic()">
        <svg class="mic-icon" viewBox="0 0 24 24">
          <rect x="8" y="2" width="8" height="13" rx="4"/>
          <path d="M4 11a8 8 0 0 0 16 0"/>
          <line x1="12" y1="18" x2="12" y2="22"/>
        </svg>
      </button>
    </div>

    <div class="mode-panel" id="panel-sms">
      <div class="text-row">
        <div class="text-input-wrap">
          <input type="text" class="text-input" placeholder="输入消息...">
        </div>
        <button class="send-btn">
          <svg class="send-icon" viewBox="0 0 24 24">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22,2 15,22 11,13 2,9"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="mode-panel" id="panel-read">
      <div class="text-row">
        <div class="text-input-wrap">
          <input type="text" class="text-input" placeholder="输入要朗读的文字...">
        </div>
        <button class="send-btn">
          <svg class="send-icon" viewBox="0 0 24 24">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22,2 15,22 11,13 2,9"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="response-toast" id="response-toast"></div>
  </div>
</div>

<!-- Waveform -->
<script>
const canvas = document.getElementById('waveform');
const ctx = canvas.getContext('2d');
const BAR_COUNT = 45;
const DPR = window.devicePixelRatio || 1;

function resizeWave() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * DPR;
  canvas.height = rect.height * DPR;
  ctx.scale(DPR, DPR);
}
resizeWave();
window.addEventListener('resize', resizeWave);

const phases = Array.from({length:BAR_COUNT},()=>Math.random()*Math.PI*2);
const speeds = Array.from({length:BAR_COUNT},()=>0.5+Math.random()*1.2);

let targetVolume=0, currentVolume=0;
const BREATH_AMP=0.055, SPEAK_AMP=0.70, VOLUME_LERP=0.08;

let autoTime=0;
const speechBursts=[
  {start:0.5,dur:0.8,amp:0.7},{start:1.6,dur:0.5,amp:0.55},{start:2.4,dur:1.2,amp:0.85},{start:4.0,dur:0.6,amp:0.6},
  {start:5.0,dur:0.4,amp:0.75},{start:5.8,dur:0.9,amp:0.9},{start:7.0,dur:0.3,amp:0.5},
  {start:9.0,dur:0.7,amp:0.65},{start:10.0,dur:0.55,amp:0.8},{start:10.8,dur:0.35,amp:0.55},
  {start:11.45,dur:0.5,amp:0.7},{start:12.2,dur:0.85,amp:0.9},{start:13.4,dur:0.25,amp:0.6},
  {start:14.0,dur:1.0,amp:0.75},{start:15.3,dur:0.45,amp:0.85},{start:16.1,dur:0.35,amp:0.5},
];
const CYCLE=18;
let time=0;

function drawWave(){
  requestAnimationFrame(drawWave);
  const dt=0.016; time+=dt; autoTime+=dt;
  if(autoTime>=CYCLE) autoTime-=CYCLE;
  targetVolume=0;
  for(const b of speechBursts){
    if(autoTime>=b.start&&autoTime<=b.start+b.dur){
      const p=(autoTime-b.start)/b.dur;
      let env=1;
      if(p<0.12) env=p/0.12;
      else if(p>0.82) env=(1-p)/0.18;
      targetVolume=b.amp*env;
      break;
    }
  }
  currentVolume+=(targetVolume-currentVolume)*VOLUME_LERP;
  const W=canvas.width/DPR,H=canvas.height/DPR,CY=H/2;
  const barW=W/BAR_COUNT*0.50,gap=W/BAR_COUNT*0.50;
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle='#e8e8e3';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,CY);ctx.lineTo(W,CY);ctx.stroke();

  for(let i=0;i<BAR_COUNT;i++){
    const x=i*(barW+gap)+gap/2;
    const t=time*speeds[i];
    const organic=Math.sin(t*2.5+phases[i]);
    const noise=Math.sin(t*5.1+phases[i]*1.7)*0.4+Math.sin(t*9.3+phases[i]*0.9)*0.25+Math.sin(t*15.7+phases[i]*0.4)*0.15;
    const vibrato=Math.sin(i*0.3+time*0.4)*0.06*currentVolume;
    const breathe=organic*0.045+noise*0.012;
    const speak=(organic*0.55+noise*0.22+vibrato)*currentVolume;
    const amplitude=breathe+speak;
    const halfH=Math.abs(amplitude)*H*0.45;
    const top=CY-halfH,bot=CY+halfH;
    const dist=Math.abs(i-BAR_COUNT/2)/(BAR_COUNT/2);
    const alpha=0.6-dist*0.35;
    ctx.fillStyle=`rgba(40,40,40,${alpha})`;
    const r=barW*0.45;
    ctx.beginPath();
    ctx.moveTo(x,top+r);ctx.arcTo(x,top,x+barW,top,r);
    ctx.arcTo(x+barW,top,x+barW,bot,r);ctx.arcTo(x+barW,bot,x,bot,r);
    ctx.arcTo(x,bot,x,top,r);ctx.closePath();ctx.fill();
  }
}
drawWave();
</script>

<!-- UI -->
<script>
const tabs=document.querySelectorAll('.mode-tab');
const panels=document.querySelectorAll('.mode-panel');
const styleSelect=document.getElementById('style-select');

const STYLES_CHAT=['清纯男高','贴心男友','幽默','温柔','知性','性感'];
const STYLES_READ=[];

function setStyleOptions(mode){
  styleSelect.innerHTML='';
  const list=mode==='read'?STYLES_READ:STYLES_CHAT;
  if(list.length===0){ styleSelect.classList.add('hidden'); return; }
  styleSelect.classList.remove('hidden');
  list.forEach(s=>{const o=document.createElement('option');o.textContent=s;styleSelect.appendChild(o);});
}

tabs.forEach(tab=>{
  tab.addEventListener('click',()=>{
    tabs.forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    const mode=tab.dataset.mode;
    panels.forEach(p=>p.classList.remove('active'));
    document.getElementById('panel-'+mode).classList.add('active');
    setStyleOptions(mode);
  });
});
setStyleOptions('voice');

let isRecording=false;
function handleMic(){
  isRecording=!isRecording;
  document.getElementById('mic-btn').classList.toggle('recording',isRecording);
  if(!isRecording) showResponse('模拟AI回复：「嗯，好的~」');
}

document.querySelectorAll('.send-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const input=btn.parentElement.querySelector('input');
    const text=input?input.value.trim():'';
    if(text){ showResponse('朗读：「'+text+'」'); input.value=''; }
  });
});

document.querySelectorAll('.text-input').forEach(input=>{
  input.addEventListener('keydown',e=>{
    if(e.key==='Enter') input.parentElement.parentElement.querySelector('.send-btn')?.click();
  });
});

function showResponse(msg){
  const toast=document.getElementById('response-toast');
  toast.textContent=msg; toast.classList.add('visible');
  clearTimeout(toast._timeout);
  toast._timeout=setTimeout(()=>toast.classList.remove('visible'),3000);
}
</script>
</body>
</html>
